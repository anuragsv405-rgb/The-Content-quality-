<!DOCTYPE html>
<html>
<head>
<title>SSC Mock Test</title>

<script>
let time = 120; // 2 min
let score = 0;

function startTimer() {
  let timer = setInterval(function() {
    document.getElementById("timer").innerHTML = time;
    time--;

    if (time < 0) {
      clearInterval(timer);
      submitTest();
    }
  }, 1000);
}

function submitTest() {
  let answers = ["b","c","a","d","b"];

  for (let i = 1; i <= 5; i++) {
    let q = document.querySelector('input[name="q'+i+'"]:checked');
    if (q && q.value == answers[i-1]) {
      score++;
    }
  }

  document.body.innerHTML = "<h1>Your Score: " + score + "/5</h1>";
}
</script>

</head>

<body onload="startTimer()">

<h2>SSC Mock Test (5 Questions)</h2>
<h3>Time Left: <span id="timer">120</span> sec</h3>

<form>

<p>1. भारत की राजधानी क्या है?</p>
<input type="radio" name="q1" value="a"> मुंबई<br>
<input type="radio" name="q1" value="b"> दिल्ली<br>

<p>2. 2 + 2 = ?</p>
<input type="radio" name="q2" value="a"> 3<br>
<input type="radio" name="q2" value="b"> 5<br>
<input type="radio" name="q2" value="c"> 4<br>

<p>3. सूर्य किस दिशा से उगता है?</p>
<input type="radio" name="q3" value="a"> पूर्व<br>
<input type="radio" name="q3" value="b"> पश्चिम<br>

<p>4. भारत का राष्ट्रीय पशु कौन है?</p>
<input type="radio" name="q4" value="a"> शेर<br>
<input type="radio" name="q4" value="d"> बाघ<br>

<p>5. 10 / 2 = ?</p>
<input type="radio" name="q5" value="a"> 2<br>
<input type="radio" name="q5" value="b"> 5<br>

<br>
<button type="button" onclick="submitTest()">Submit</button>

</form>

</body>
</html>
